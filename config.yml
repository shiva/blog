baseURL: "https://shiv.me/"
title: "Shivanand Velmurugan — Product leader. Systems thinker."
copyright: "© Shivanand Velmurugan"
theme: [hugo-duality]

pagination:
  pagerSize: 25

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

minify:
  disableXML: true

taxonomies:
  category: categories
  tag: tags
  series: series

menu:
  main:
    - name: writing
      url: /posts/
      weight: 10
    - name: projects
      url: /projects/
      weight: 20
    - name: photos
      url: /photos/
      weight: 30
    - name: reading
      url: /reading/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "Shiva. Product leader at Microsoft, building the Schema Registry for real-time data at planetary scale. Systems thinker, founder of FriedSilicon. Vancouver, BC."
  author: Shivanand Velmurugan
  wordmark: shiv.me
  footerTag: "Vancouver, BC · built on fried silicon"
  ogImage: /og.png
  twitter: shiva
  mainSections: [posts]

  duality:
    enable: true
    product:
      label: Product
      tag: "Vancouver, BC · Microsoft"
      heading: 'I ship products<br>that scale<span class="dot">.</span>'
      lede: >-
        <b>Shiva.</b> Product leader at Microsoft — building
        <a class="lk" href="https://learn.microsoft.com/en-us/fabric/real-time-intelligence/schema-sets/schema-registry-overview">Schema Registry</a>
        for real-time data at planetary scale: governance, interoperability, and the developer experience on top.
        I care about sharp strategy, disciplined execution, and staying close to the systems that make products real.
      flip: "flip the switch ▸ see the code"
    hacker:
      label: Hacker
      tag: "~/shiva · while(alive){ build(); }"
      heading: 'I build things<br>that must exist<span class="dot">_</span>'
      lede: >-
        <b>$ whoami</b> — Shiva. I build databases and languages for fun: an
        <a class="lk" href="https://github.com/friedsilicon/fdb">in-memory DB</a>, a
        <a class="lk" href="https://github.com/friedsilicon/sodl">DSL</a>, a
        <a class="lk" href="https://friedsilicon.com/silicadb/index.html">local-first engine</a>, and a patched
        <a class="lk" href="https://github.com/shiva/st">terminal</a>. I've also built an OS, an in-memory database,
        and a pair of languages and compilers for a carrier-class router.
      flip: "◂ flip back ▸ the product side"
    impact:
      label: "// impact"
      title: Track record
      ladder:
        - co: Microsoft
          ro: >-
            Product leader on the <a class="lk" href="https://learn.microsoft.com/en-us/fabric/real-time-intelligence/schema-sets/schema-registry-overview">Schema Registry</a>
            — shaping governance, interoperability, and the developer experience for real-time data at planetary scale.
        - co: "AWS — Amazon SNS & SQS"
          ro: >-
            Operated core messaging infrastructure at scale. Grew the business <b>&gt;15x</b>;
            <b>300K&nbsp;→&nbsp;1M</b> weekly active accounts.
        - co: GE — Predix
          ro: Shipped an ML data-ingestion product that automatically classified arbitrary JSON and CSV sources.
        - co: Ericsson
          ro: >-
            Built the core systems for a carrier-class router: an operating system, an in-memory database,
            and several languages and compilers.
      cta:
        text: "Full résumé / CV →"
        url: /cv/
    systems:
      label: "// systems"
      title: What I build
      intro: >-
        Side work at <a class="lk" href="https://friedsilicon.com/">FriedSilicon</a> — for the love of it.
      cards:
        - name: st
          badge: "23★ · C"
          url: "https://github.com/shiva/st"
          desc: "suckless terminal, my patch set. Minimal, fast, mine."
        - name: sodl
          badge: DSL
          url: "https://github.com/friedsilicon/sodl"
          desc: "Structured Object Definition Language. Grammar, types, spec."
        - name: fdb
          badge: "3★"
          url: "https://github.com/friedsilicon/fdb"
          desc: "In-memory database / KV store, from scratch."
        - name: silicadb
          badge: WIP
          url: "https://friedsilicon.com/silicadb/index.html"
          desc: "Local-first data engine. Sync, conflict, offline."
    operate:
      label: "// how i lead"
      title: How I operate
      body: >-
        I think the strongest product work comes from tight alignment between strategy, design, and engineering.
        I favor clarity, focused iteration, and technical depth that sharpens judgment rather than creating distance.
    why:
      label: "// why i build"
      title: Why I build
      body: >-
        I'm drawn to systems that are demanding, durable, and quietly important. My work in operating systems,
        databases, and language design has shaped how I think about product architecture, craftsmanship, and execution.
    recent:
      enable: true
      section: posts
      count: 5
      label: "// recent writing"
      title: Latest posts
    elsewhere:
      - { name: X, handle: "@shiva", url: "https://x.com/shiva", rel: me }
      - { name: GitHub, handle: "@shiva", url: "https://github.com/shiva", rel: me }
      - { name: LinkedIn, handle: vshivanand, url: "https://www.linkedin.com/in/vshivanand", rel: me }
      - { name: Bluesky, handle: "@shiv.me", url: "https://bsky.app/profile/vshivanand.bsky.social", rel: me }
      - { name: Mastodon, handle: "@shiv", url: "https://mastodon.cloud/@shiv", rel: me }
      - { name: Substack, handle: shivan, url: "https://shivan.substack.com/", rel: me }
      - { name: Résumé, handle: /cv, url: /cv/ }
      - { name: Flickr, handle: shvelmur, url: "https://www.flickr.com/photos/shvelmur", rel: me }
      - { name: Email, handle: shiv@shiv.me, url: "mailto:shiv@shiv.me", rel: me }

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true

services:
  instagram:
    disableInlineCSS: true
  twitter:
    disableInlineCSS: true
